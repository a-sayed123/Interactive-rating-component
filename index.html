<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Interactive rating component</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main>  
      <div class="card card-1" data-rating-card>
        <div class="card-icon">
          <img src="./images/icon-star.svg" alt="star icon" class="card-img" />
        </div>
        <div class="card-content">
          <h1 class="card-title">How did we do?</h1>
          <p class="card-text">
            Please let us know how we did with your support request. All feedback
            is appreciated to help us improve our offering!
          </p>
        </div>
        <div class="card-options" role="radiogroup" aria-label="Rating our service">
          <button class="card-btn" type="radio" value="1" aria-checked="false" role="radio" data-rating-btn> 1 </button>
          <button class="card-btn" type="radio" value="2" aria-checked="false" role="radio" data-rating-btn> 2 </button>
          <button class="card-btn" type="radio" value="3" aria-checked="false" role="radio" data-rating-btn> 3 </button>
          <button class="card-btn" type="radio" value="4" aria-checked="false" role="radio" data-rating-btn> 4 </button>
          <button class="card-btn" type="radio" value="5" aria-checked="false" role="radio" data-rating-btn> 5 </button>
        </div>
        <button class="submit" data-submit-btn>submit</button>
      </div>

      <div class="card card-2 hidden" data-thank-you>
        <header>
          <div class="card-icon">
            <img
              src="./images/illustration-thank-you.svg"
              alt="Thank you"
              class="card-img"
            />
          </div>
          <div class="card-result">
            <span class="card-result-text" aria-live="polite" data-selected-rating-text
              >You selected 0 out of 5
            </span>
          </div>
        </header>
        <div class="card-content">
          <h1 class="card-title">Thank you!</h1>
          <p class="card-text">
            We appreciate you taking the time to give a rating. If you ever need
            more support, do not hesitate to get in touch!
          </p>
        </div>
      </div>
    </main>
    <script src="./script/script.js"></script>
  </body>
</html>
