<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <!-- <link rel="stylesheet" href="https://fonts.google.com/specimen/Overpass"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">

    <title>Frontend Mentor | Interactive rating component</title>
    <link rel="stylesheet" href="./css/style.css">

      .attribution {
        font-size: 11px;

  </head>
  <body>
    <div class="card">
      <form action="" method="post" class="card-form">
        <div class="card-icon"><img src="./images/icon-star.svg" alt="star icon" class="card-img"></div>
          <div class="card-content">
          <h2 class="card-title ">How did we do?</h2>
          <p class="card-text">
            Please let us know how we did with your support  request.  
            All feedback is appreciated to help us  improve our offering!
          </p> 
        </div>
        <div class="card-options">
          <button class="card-btn">1</button>
          <button class="card-btn">2</button>
          <button class="card-btn">3</button>
          <button class="card-btn">4</button>
          <button class="card-btn">5</button>
        </div>
        <button class="submit"><span>submit</span></button>
      </form>
    </div>

    <!-- 
  <!-/- Rating state start -/->

  How did we do?


  1 2 3 4 5

  Submit

  <!-/- Rating state end -/->

  <!-\- Thank you state start -\->

  You selected <!-/- Add rating here -\-> out of 5

  Thank you!

  We appreciate you taking the time to give a rating. If you ever need more support, 
  don’t hesitate to get in touch!

  <!-\- Thank you state end -\->
